name: pocketllm_lite
description: "A premium, privacy-first, offline AI chat application"
publish_to: "none"

version: 1.0.21+21

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ota_update: ^7.0.2
  flutter_riverpod: ^3.3.1
  hive_ce_flutter: ^2.3.4
  hive_ce: ^2.19.3
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ">=0.19.0 <0.21.0"
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  go_router: ^17.0.0
  google_fonts: ^6.3.3
  flutter_markdown: ^0.7.7+1
  package_info_plus: ^8.3.1
  uuid: ^4.5.2
  transparent_image: ^2.0.1
  flutter_native_splash: ^2.4.7
  url_launcher: ^6.3.2

  flutter_colorpicker: ^1.1.0
  share_plus: ^12.0.1
  file_picker: ^8.0.0
  pdf: ^3.10.0
  flutter_m3shapes: ^1.0.0+2
  cactus: ^1.3.0
  background_downloader: ^9.5.4
  dynamic_color: ^1.8.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_secure_storage: ^10.2.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  flutter_highlight: ^0.7.0
  syncfusion_flutter_pdf: ^33.2.4

  flutter_localizations:
    sdk: flutter
  waveform_flutter: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_ce_generator: ^1.11.1
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.4.4

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#ffffff"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/logo.png"
  android_12:
    image: "assets/logo.png"
    icon_background_color: "#ffffff"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
